<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Cloud-edge-device LSTM authentication workflow</title>
  <desc id="desc">A polished workflow diagram showing device behavior data flowing to edge LSTM inference and authentication, with cloud model training, fine-tuning, feedback, and model update.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f8fbff"/>
      <stop offset="1" stop-color="#eef6ff"/>
    </linearGradient>
    <linearGradient id="blue" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#2563eb"/>
      <stop offset="1" stop-color="#0f766e"/>
    </linearGradient>
    <linearGradient id="softBlue" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#eff6ff"/>
      <stop offset="1" stop-color="#ecfeff"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="16" flood-color="#0f172a" flood-opacity="0.14"/>
    </filter>
    <marker id="arrowBlue" markerWidth="14" markerHeight="14" refX="11" refY="7" orient="auto" markerUnits="strokeWidth">
      <path d="M 0 0 L 14 7 L 0 14 z" fill="#2563eb"/>
    </marker>
    <marker id="arrowTeal" markerWidth="14" markerHeight="14" refX="11" refY="7" orient="auto" markerUnits="strokeWidth">
      <path d="M 0 0 L 14 7 L 0 14 z" fill="#0f766e"/>
    </marker>
    <style>
      .panel { fill: rgba(255,255,255,0.92); stroke: #bfdbfe; stroke-width: 2.5; filter: url(#shadow); }
      .module { fill: url(#softBlue); stroke: #2563eb; stroke-width: 2; }
      .module2 { fill: #ffffff; stroke: #0f766e; stroke-width: 2; }
      .title { font: 800 46px Arial, Helvetica, sans-serif; fill: #0f172a; letter-spacing: .2px; }
      .subtitle { font: 600 20px Arial, Helvetica, sans-serif; fill: #475569; }
      .label { font: 700 26px Arial, Helvetica, sans-serif; fill: #172554; }
      .small { font: 600 18px Arial, Helvetica, sans-serif; fill: #334155; }
      .tiny { font: 600 15px Arial, Helvetica, sans-serif; fill: #64748b; }
      .ok { fill: #16a34a; }
      .bad { fill: #dc2626; }
      .lineBlue { fill: none; stroke: #2563eb; stroke-width: 5; marker-end: url(#arrowBlue); }
      .lineTeal { fill: none; stroke: #0f766e; stroke-width: 5; marker-end: url(#arrowTeal); }
      .dash { stroke-dasharray: 10 10; }
    </style>
  </defs>

  <rect width="1600" height="900" fill="url(#bg)"/>
  <circle cx="1260" cy="120" r="220" fill="#dbeafe" opacity="0.28"/>
  <circle cx="300" cy="760" r="260" fill="#ccfbf1" opacity="0.24"/>

  <text x="800" y="70" text-anchor="middle" class="title">Cloud-Edge-Device Collaborative Authentication</text>
  <text x="800" y="105" text-anchor="middle" class="subtitle">LSTM behavior modeling, device fingerprinting, transfer learning, and feedback-driven model update</text>

  <rect x="50" y="150" width="410" height="670" rx="32" class="panel"/>
  <rect x="595" y="150" width="410" height="670" rx="32" class="panel"/>
  <rect x="1140" y="150" width="410" height="670" rx="32" class="panel"/>

  <text x="255" y="215" text-anchor="middle" class="title">Device</text>
  <text x="800" y="215" text-anchor="middle" class="title">Edge</text>
  <text x="1345" y="215" text-anchor="middle" class="title">Cloud</text>

  <!-- Device panel -->
  <rect x="95" y="265" width="320" height="92" rx="20" class="module2"/>
  <text x="255" y="304" text-anchor="middle" class="label">Autonomous Devices</text>
  <text x="255" y="334" text-anchor="middle" class="small">Car · Forklift · UAV</text>

  <g transform="translate(120 395)">
    <circle cx="48" cy="48" r="44" fill="#ecfeff" stroke="#0f766e" stroke-width="3"/>
    <path d="M18 57 h60 l-8 -22 h-36 z" fill="#0f766e" opacity="0.88"/>
    <circle cx="31" cy="64" r="7" fill="#ffffff"/><circle cx="67" cy="64" r="7" fill="#ffffff"/>
    <text x="48" y="112" text-anchor="middle" class="tiny">Car</text>
  </g>
  <g transform="translate(210 395)">
    <circle cx="48" cy="48" r="44" fill="#ecfeff" stroke="#0f766e" stroke-width="3"/>
    <rect x="25" y="38" width="42" height="26" rx="4" fill="#0f766e" opacity="0.88"/>
    <path d="M66 34 h24 v8 H74 v26 h-8 z" fill="#0f766e"/>
    <circle cx="35" cy="69" r="7" fill="#ffffff"/><circle cx="68" cy="69" r="7" fill="#ffffff"/>
    <text x="48" y="112" text-anchor="middle" class="tiny">Forklift</text>
  </g>
  <g transform="translate(300 395)">
    <circle cx="48" cy="48" r="44" fill="#ecfeff" stroke="#0f766e" stroke-width="3"/>
    <circle cx="48" cy="49" r="12" fill="#0f766e"/>
    <path d="M48 49 L18 29 M48 49 L78 29 M48 49 L18 72 M48 49 L78 72" stroke="#0f766e" stroke-width="5"/>
    <circle cx="18" cy="29" r="9" fill="#99f6e4" stroke="#0f766e"/><circle cx="78" cy="29" r="9" fill="#99f6e4" stroke="#0f766e"/>
    <circle cx="18" cy="72" r="9" fill="#99f6e4" stroke="#0f766e"/><circle cx="78" cy="72" r="9" fill="#99f6e4" stroke="#0f766e"/>
    <text x="48" y="112" text-anchor="middle" class="tiny">UAV</text>
  </g>

  <rect x="95" y="560" width="320" height="150" rx="22" class="module"/>
  <text x="255" y="602" text-anchor="middle" class="label">Behavior Data</text>
  <polyline points="125,665 165,640 205,660 245,618 285,635 325,600 385,625" fill="none" stroke="#0f766e" stroke-width="5"/>
  <circle cx="125" cy="665" r="7" fill="#0f766e"/><circle cx="165" cy="640" r="7" fill="#0f766e"/><circle cx="205" cy="660" r="7" fill="#0f766e"/>
  <circle cx="245" cy="618" r="7" fill="#0f766e"/><circle cx="285" cy="635" r="7" fill="#0f766e"/><circle cx="325" cy="600" r="7" fill="#0f766e"/><circle cx="385" cy="625" r="7" fill="#0f766e"/>
  <text x="255" y="692" text-anchor="middle" class="tiny">X · Y · Z · Power · State · Fingerprint</text>

  <!-- Edge panel -->
  <rect x="640" y="275" width="320" height="170" rx="24" class="module"/>
  <text x="800" y="317" text-anchor="middle" class="label">LSTM Inference</text>
  <circle cx="685" cy="365" r="10" fill="#60a5fa"/><circle cx="685" cy="405" r="10" fill="#60a5fa"/>
  <rect x="730" y="342" width="46" height="46" rx="10" fill="#ffffff" stroke="#2563eb" stroke-width="3"/>
  <rect x="815" y="342" width="46" height="46" rx="10" fill="#ffffff" stroke="#2563eb" stroke-width="3"/>
  <rect x="730" y="400" width="46" height="46" rx="10" fill="#ffffff" stroke="#2563eb" stroke-width="3"/>
  <rect x="815" y="400" width="46" height="46" rx="10" fill="#ffffff" stroke="#2563eb" stroke-width="3"/>
  <path d="M696 365 H730 M776 365 H815 M861 365 H925 M696 405 H730 M776 405 H815 M861 405 H925" stroke="#2563eb" stroke-width="4" fill="none" marker-end="url(#arrowBlue)"/>

  <rect x="640" y="515" width="320" height="205" rx="24" class="module"/>
  <text x="800" y="558" text-anchor="middle" class="label">Authentication</text>
  <path d="M800 585 l70 28 v58 c0 45 -31 76 -70 92 c-39 -16 -70 -47 -70 -92 v-58 z" fill="#dbeafe" stroke="#1d4ed8" stroke-width="5"/>
  <rect x="779" y="641" width="42" height="48" rx="8" fill="#1d4ed8"/>
  <path d="M785 641 v-18 c0 -20 30 -20 30 0 v18" fill="none" stroke="#1d4ed8" stroke-width="8"/>
  <circle cx="690" cy="650" r="34" class="ok"/><path d="M672 648 l14 15 l31 -35" fill="none" stroke="#ffffff" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
  <circle cx="910" cy="650" r="34" class="bad"/><path d="M895 635 l30 30 M925 635 l-30 30" stroke="#ffffff" stroke-width="8" stroke-linecap="round"/>
  <text x="690" y="708" text-anchor="middle" class="small" fill="#166534">Authorized</text>
  <text x="910" y="708" text-anchor="middle" class="small" fill="#991b1b">Anomaly</text>

  <!-- Cloud panel -->
  <rect x="1190" y="265" width="310" height="125" rx="22" class="module"/>
  <text x="1345" y="310" text-anchor="middle" class="label">Model Training</text>
  <text x="1345" y="344" text-anchor="middle" class="small">Base LSTM from source data</text>
  <rect x="1245" y="353" width="40" height="24" rx="8" fill="#ffffff" stroke="#2563eb" stroke-width="2"/>
  <rect x="1300" y="353" width="40" height="24" rx="8" fill="#ffffff" stroke="#2563eb" stroke-width="2"/>
  <rect x="1355" y="353" width="40" height="24" rx="8" fill="#ffffff" stroke="#2563eb" stroke-width="2"/>
  <path d="M1285 365 H1300 M1340 365 H1355 M1395 365 H1445" stroke="#2563eb" stroke-width="3" fill="none" marker-end="url(#arrowBlue)"/>

  <rect x="1190" y="455" width="310" height="125" rx="22" class="module"/>
  <text x="1345" y="500" text-anchor="middle" class="label">Fine-tuning</text>
  <text x="1345" y="534" text-anchor="middle" class="small">Adapt to forklift and UAV</text>
  <path d="M1265 535 h48 l16 28 h-80 z" fill="#ffffff" stroke="#2563eb" stroke-width="3"/>
  <circle cx="1395" cy="538" r="26" fill="#dbeafe" stroke="#2563eb" stroke-width="4"/>
  <path d="M1395 505 v66 M1362 538 h66" stroke="#2563eb" stroke-width="5"/>

  <rect x="1190" y="645" width="310" height="115" rx="22" class="module"/>
  <text x="1345" y="690" text-anchor="middle" class="label">Model Update</text>
  <text x="1345" y="724" text-anchor="middle" class="small">Deploy improved parameters</text>
  <path d="M1252 716 c-18 0 -32 -14 -32 -31 c0 -16 12 -29 27 -31 c8 -22 29 -37 55 -37 c31 0 56 24 58 54 h15 c20 0 36 15 36 34 c0 19 -16 34 -36 34 h-123 z" fill="#bfdbfe" stroke="#2563eb" stroke-width="4"/>

  <!-- Cross-panel flows -->
  <path d="M415 635 C500 635 540 635 595 635" class="lineTeal"/>
  <text x="505" y="610" text-anchor="middle" class="small">sequence upload</text>
  <path d="M460 450 C520 450 535 360 640 360" class="lineTeal"/>
  <path d="M960 360 C1040 360 1090 328 1190 328" class="lineBlue"/>
  <text x="1072" y="305" text-anchor="middle" class="small">training samples</text>
  <path d="M1345 390 V455" class="lineBlue"/>
  <path d="M1345 580 V645" class="lineBlue"/>
  <path d="M1190 518 C1080 518 1065 615 960 615" class="lineBlue"/>
  <text x="1086" y="575" text-anchor="middle" class="small">feedback</text>
  <path d="M1190 720 C1090 800 1010 785 905 720" class="lineBlue"/>
  <text x="1038" y="808" text-anchor="middle" class="small">updated model</text>
  <path d="M640 680 C535 700 520 720 460 720" class="lineTeal dash"/>
  <text x="535" y="752" text-anchor="middle" class="small">verification result</text>

  <rect x="520" y="122" width="560" height="46" rx="23" fill="#ffffff" stroke="#cbd5e1"/>
  <text x="800" y="153" text-anchor="middle" class="small">Prediction consistency + state classification + device fingerprint</text>
</svg>
